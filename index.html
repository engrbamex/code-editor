<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bamextech Code Pen</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui;
        background: #1e1e24;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        background: #13131a;
        border-bottom: 2px solid #2d2d37;
      }
      button {
        background: #2ecc71;
        color: #fff;
        border: 0;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
      }
      .container {
        display: flex;
        flex: 1;
      }
      .workspace,
      .preview {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .workspace {
        border-right: 2px solid #2d2d37;
      }
      .label {
        padding: 8px 12px;
        background: #2d2d37;
        font-size: 0.8rem;
      }
      .editor {
        flex: 1;
        min-height: 0;
      }
      iframe {
        flex: 1;
        border: 0;
        background: #fff;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  </head>
  <body>
    <header>
      <h3>💻 Bamextech Code Editor</h3>
      <button id="run">Run ▶</button>
    </header>
    <div class="container">
      <div class="workspace">
        <div class="label">HTML</div>
        <div id="html" class="editor"></div>
        <div class="label">CSS</div>
        <div id="css" class="editor"></div>
      </div>
      <div class="preview">
        <div class="label" style="background: #13131a">Live Preview</div>
        <iframe id="preview"></iframe>
      </div>
    </div>
    <script>
      require.config({
        paths: {
          vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs",
        },
      });
      require(["vs/editor/editor.main"], () => {
        const htmlEditor = monaco.editor.create(
          document.getElementById("html"),
          {
            language: "html",
            theme: "vs-dark",
            automaticLayout: true,
            minimap: { enabled: false },
            autoIndent: "full",
            formatOnPaste: true,
            formatOnType: true,
            value: `<h1>Welcome!</h1>
<p>Edit HTML and CSS.</p>
<button onclick="alert('Hello!')">Click Me</button>`,
          },
        );
        const cssEditor = monaco.editor.create(document.getElementById("css"), {
          language: "css",
          theme: "vs-dark",
          automaticLayout: true,
          minimap: { enabled: false },
          autoIndent: "full",
          formatOnPaste: true,
          formatOnType: true,
          value: `body{
 font-family:Arial,sans-serif;
 padding:30px;
 text-align:center;
}
h1{color:#6c5ce7}
button{
background:#6c5ce7;
color:white;
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}`,
        });
        const frame = document.getElementById("preview");
        function update() {
          const src = `<!doctype html><html><head><style>${cssEditor.getValue()}</style></head><body>${htmlEditor.getValue()}</body></html>`;
          const d = frame.contentDocument || frame.contentWindow.document;
          d.open();
          d.write(src);
          d.close();
        }
        htmlEditor.onDidChangeModelContent(update);
        cssEditor.onDidChangeModelContent(update);
        document.getElementById("run").onclick = update;
        update();
      });
    </script>
  </body>
</html>
